name: random_compass_app
description: Random Compass - Discover nearby places with a mystery compass
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

resolution: workspace

dependencies:
  app_state:
    path: ../../utilities/app_state
  compass:
    path: ../../features/compass
  home:
    path: ../../features/home
  location_service:
    path: ../../utilities/location_service
  permission_service:
    path: ../../utilities/permission_service
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  auto_route: ^11.1.0
  get_it: ^7.7.0
  http: ^1.2.1

dev_dependencies:
  auto_route_generator: ^10.5.0
  bdd_widget_test: ^2.1.3
  build_runner: ^2.4.9
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
